# =============================================================================
# voyagr.globusdemos.com  —  apex + wildcard tenant subdomains
# Multi-tenant Next.js CMS upstream on 127.0.0.1:3050.
# Tenant routing happens in Next.js middleware via the Host header.
#
# SSL: wildcard cert covers *.voyagr.globusdemos.com + apex via DNS-01.
# Auto-renews via certbot-dns-cloudflare.
# =============================================================================

upstream voyagr_u { server 127.0.0.1:3050; keepalive 32; }

# ---- HTTPS for apex + all tenant subdomains --------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name voyagr.globusdemos.com *.voyagr.globusdemos.com;

    ssl_certificate     /etc/letsencrypt/live/voyagr-wildcard/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voyagr-wildcard/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://voyagr_u;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}

# ---- HTTP → HTTPS redirect for everything ---------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name voyagr.globusdemos.com *.voyagr.globusdemos.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        allow all;
    }

    return 301 https://$host$request_uri;
}
